name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

# 防止連續上傳多個檔案時，同一 branch 同時跑多個 EXE build。
# 新 commit 進來時，自動取消同 branch 仍在執行中的舊 build，只保留最新一次。
concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openpyxl requests beautifulsoup4 lxml matplotlib yfinance pyinstaller

      - name: Verify project files
        shell: cmd
        run: |
          dir
          dir services
          dir teacher_strategy
          dir kpattern_module
          if not exist gtc_workflow_orchestrator_v17.py exit /b 1
          if exist "gtc_workflow_orchestrator_v17 .py" exit /b 1
          if not exist data_quality_gate.py exit /b 1
          if not exist strategy_config.py exit /b 1
          if not exist workflow_log_validator.py exit /b 1

      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller --onefile --hidden-import=workflow_log_validator --hidden-import=strategy_config --hidden-import=data_quality_gate --console ^
            --paths=. ^
            --name GTC_AI_Trading_System_V17_R3 ^
            --hidden-import=gtc_workflow_orchestrator_v17 ^
            --hidden-import=services ^
            --hidden-import=services.kpattern_service ^
            --hidden-import=services.teacher_strategy_service ^
            --hidden-import=teacher_strategy ^
            --hidden-import=teacher_strategy.position_stage_engine ^
            --hidden-import=teacher_strategy.two_high_fail_engine ^
            --hidden-import=teacher_strategy.rotation_filter_engine ^
            --hidden-import=teacher_strategy.low_base_reversal_engine ^
            --hidden-import=teacher_strategy.teacher_strategy_engine ^
            --hidden-import=kpattern_module ^
            --hidden-import=kpattern_module.kpattern_pipeline ^
            --hidden-import=kpattern_module.kpattern_feature_engine ^
            --hidden-import=kpattern_module.sakata_pattern_engine ^
            --hidden-import=kpattern_module.pattern_position_engine ^
            --hidden-import=kpattern_module.pattern_score_engine ^
            --hidden-import=kpattern_module.volume_confirm_engine ^
            --hidden-import=kpattern_module.decision_layer_engine ^
            GTC_AI_Trading_System_V9_6_2_PRO_FUNDAMENTAL_LOCAL_CACHE_R10_MARKET_SNAPSHOT_FULL_FALLBACK_AND_FAIL_REASON.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GTC_EXE
          path: dist/*.exe
