name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --console ^
          --hidden-import=services ^
          --hidden-import=services.kpattern_service ^
          --hidden-import=kpattern_module ^
          --hidden-import=kpattern_module.kpattern_pipeline ^
          --hidden-import=kpattern_module.kpattern_feature_engine ^
          --hidden-import=kpattern_module.sakata_pattern_engine ^
          --hidden-import=kpattern_module.pattern_position_engine ^
          --hidden-import=kpattern_module.pattern_score_engine ^
          --hidden-import=kpattern_module.volume_confirm_engine ^
          --hidden-import=kpattern_module.decision_layer_engine ^
          GTC_AI_Trading_System_V9_6_2_PRO_FUNDAMENTAL_LOCAL_CACHE_R10_MARKET_SNAPSHOT_FULL_FALLBACK_AND_FAIL_REASON.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GTC_EXE
          path: dist/*.exe
