name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas numpy openpyxl requests beautifulsoup4 lxml matplotlib

      - name: Build EXE
        run: |
          pyinstaller --onefile --name GTC_AI_Trading_System --hidden-import=services --hidden-import=services.kpattern_service --hidden-import=kpattern_module --hidden-import=kpattern_module.kpattern_pipeline --hidden-import=kpattern_module.kpattern_feature_engine --hidden-import=kpattern_module.sakata_pattern_engine --hidden-import=kpattern_module.pattern_position_engine --hidden-import=kpattern_module.pattern_score_engine --hidden-import=kpattern_module.volume_confirm_engine --hidden-import=kpattern_module.decision_layer_engine GTC_AI_Trading_System_V9_6_2_PRO_FUNDAMENTAL_LOCAL_CACHE_R10_MARKET_SNAPSHOT_FULL_FALLBACK_AND_FAIL_REASON.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GTC_AI_Trading_System_EXE
          path: dist/*.exe
